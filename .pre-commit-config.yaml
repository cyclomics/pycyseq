repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint)
        entry: uv run ruff check
        language: system
        pass_filenames: false
        types: [python]
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format --check
        language: system
        pass_filenames: false
        types: [python]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
        types: [python]